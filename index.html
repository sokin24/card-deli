<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <!-- Primary -->
    <title>The Card Deli</title>
    <meta name="description" content="Your trading card collection, fresh & stacked. Track values, scan cards, and manage your vault." />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Open Graph (Facebook, iMessage, WhatsApp, Slack, Discord) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="The Card Deli" />
    <meta property="og:description" content="Your trading card collection, fresh & stacked. Track values, scan cards, and manage your vault." />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:image:width" content="503" />
    <meta property="og:image:height" content="496" />
    <meta property="og:image:alt" content="The Card Deli logo" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="The Card Deli" />
    <meta name="twitter:description" content="Your trading card collection, fresh & stacked." />
    <meta name="twitter:image" content="/logo.png" />

    <!-- App-like in mobile -->
    <link rel="manifest" href="/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Card Deli">
    <meta name="theme-color" content="#E8C547">
    
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
